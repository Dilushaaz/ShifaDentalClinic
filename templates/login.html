{% extends 'base.html' %}

{% block content %}

<div style="min-height: 70vh; display:flex; align-items:center; justify-content:center; padding: 40px 0;">
    <div style="width: 100%; max-width: 420px;">

        <!-- Logo / Brand -->
        <div style="text-align:center;margin-bottom:32px;">
            <div style="
                width: 72px; height: 72px;
                background: linear-gradient(135deg, #0E9F8C, #12BDA8);
                border-radius: 20px;
                display: flex; align-items: center; justify-content: center;
                font-size: 32px;
                margin: 0 auto 16px;
                box-shadow: 0 8px 24px rgba(14,159,140,0.35);
            ">🦷</div>
            <h2 style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#0B1F3A;margin-bottom:4px;">
                Doctor Login
            </h2>
            <p style="color:#9AA5B4;font-size:14px;margin:0;">
                Shifa Dental Clinic · Staff Portal
            </p>
        </div>

        <div class="shifa-card">
            <div class="shifa-card-body" style="padding: 32px;">
                <form method="POST">
                    {% csrf_token %}

                    <div style="margin-bottom:20px;">
                        <label class="form-label">
                            <i class="bi bi-person me-1"></i> Username
                        </label>
                        <input class="form-control"
                               type="text"
                               name="username"
                               placeholder="Enter your username"
                               autocomplete="username"
                               required>
                    </div>

                    <div style="margin-bottom:28px;">
                        <label class="form-label">
                            <i class="bi bi-lock me-1"></i> Password
                        </label>
                        <div style="position:relative;">
                            <input class="form-control"
                                   type="password"
                                   name="password"
                                   id="passwordInput"
                                   placeholder="Enter your password"
                                   autocomplete="current-password"
                                   required>
                            <button type="button" onclick="togglePwd()" style="
                                position:absolute;right:14px;top:50%;transform:translateY(-50%);
                                background:none;border:none;cursor:pointer;color:#9AA5B4;font-size:16px;
                                padding:0;
                            " id="pwdToggle">
                                <i class="bi bi-eye" id="pwdIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button class="btn-shifa-primary" type="submit" style="width:100%;justify-content:center;padding:13px;">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>

                </form>
            </div>
        </div>

        <p style="text-align:center;margin-top:20px;color:#9AA5B4;font-size:13px;">
            <i class="bi bi-shield-lock me-1"></i> Secure staff access only
        </p>
    </div>
</div>

<script>
function togglePwd() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('pwdIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>

{% endblock %}
