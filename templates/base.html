<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shifa Dental Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --navy:       #0B1F3A;
            --navy-light: #12305A;
            --teal:       #0E9F8C;
            --teal-light: #12BDA8;
            --teal-pale:  #E0F7F4;
            --gold:       #F5A623;
            --white:      #FFFFFF;
            --gray-50:    #F8FAFB;
            --gray-100:   #EEF2F7;
            --gray-400:   #9AA5B4;
            --gray-600:   #4A5568;
            --gray-900:   #1A202C;
            --shadow-sm:  0 2px 8px rgba(11,31,58,0.08);
            --shadow-md:  0 8px 24px rgba(11,31,58,0.12);
            --shadow-lg:  0 16px 48px rgba(11,31,58,0.18);
            --shadow-3d:  0 20px 60px rgba(11,31,58,0.22), 0 4px 16px rgba(14,159,140,0.15);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            margin: 0;
        }

        /* ── NAVBAR ── */
        .shifa-nav {
            background: rgba(11, 31, 58, 0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(14,159,140,0.2);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 24px rgba(11,31,58,0.3);
        }

        .shifa-nav .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
            flex-wrap: wrap;
            gap: 0;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--teal), var(--teal-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(14,159,140,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .nav-brand:hover .nav-brand-icon {
            transform: translateY(-2px) rotate(5deg);
            box-shadow: 0 8px 20px rgba(14,159,140,0.5);
        }

        .nav-brand-text {
            display: flex;
            flex-direction: column;
        }

        .nav-brand-title {
            color: var(--white);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.3px;
            line-height: 1.1;
        }

        .nav-brand-sub {
            color: var(--teal-light);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .nav-link-item {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 13px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .nav-link-item:hover {
            color: var(--white);
            background: rgba(14,159,140,0.18);
        }

        .nav-link-item.active {
            color: var(--teal-light);
            background: rgba(14,159,140,0.12);
        }

        .nav-btn-dashboard {
            background: var(--gold);
            color: var(--navy) !important;
            font-weight: 600;
            border-radius: 8px;
            padding: 7px 14px;
            transition: all 0.2s ease;
        }

        .nav-btn-dashboard:hover {
            background: #e8940d;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245,166,35,0.4);
        }

        .nav-btn-login {
            background: rgba(14,159,140,0.15);
            color: var(--teal-light) !important;
            border: 1px solid rgba(14,159,140,0.4);
            font-weight: 600;
            border-radius: 8px;
            padding: 7px 14px;
            transition: all 0.2s ease;
        }

        .nav-btn-login:hover {
            background: var(--teal);
            color: var(--white) !important;
            border-color: var(--teal);
        }

        .nav-btn-logout {
            background: rgba(220,53,69,0.12);
            color: #f87171 !important;
            border: 1px solid rgba(220,53,69,0.3);
            font-weight: 600;
            border-radius: 8px;
            padding: 7px 14px;
            transition: all 0.2s ease;
        }

        .nav-btn-logout:hover {
            background: #dc3545;
            color: var(--white) !important;
            border-color: #dc3545;
        }

        /* ── MAIN CONTENT WRAPPER ── */
        .main-content {
            min-height: calc(100vh - 68px - 80px);
            padding: 40px 0 60px;
        }

        /* ── GLOBAL CARD STYLE ── */
        .shifa-card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid rgba(14,159,140,0.1);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .shifa-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-3d);
        }

        .shifa-card-header {
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: var(--white);
            padding: 20px 28px;
        }

        .shifa-card-body {
            padding: 24px 28px;
        }

        /* ── PAGE HEADER BANNER ── */
        .page-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 60%, rgba(14,159,140,0.3) 100%);
            color: var(--white);
            padding: 36px 0 32px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(14,159,140,0.15) 0%, transparent 70%);
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 700;
            margin: 0 0 4px;
        }

        .page-header p {
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            margin: 0;
        }

        /* ── FORMS ── */
        .form-control, .form-select {
            border: 1.5px solid var(--gray-100);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--white);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(14,159,140,0.15);
            outline: none;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ── BUTTONS ── */
        .btn-shifa-primary {
            background: linear-gradient(135deg, var(--teal), var(--teal-light));
            color: var(--white);
            border: none;
            border-radius: 10px;
            padding: 11px 24px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(14,159,140,0.3);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-shifa-primary:hover {
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(14,159,140,0.45);
        }

        .btn-shifa-secondary {
            background: var(--white);
            color: var(--teal);
            border: 1.5px solid var(--teal);
            border-radius: 10px;
            padding: 10px 22px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .btn-shifa-secondary:hover {
            background: var(--teal-pale);
            color: var(--teal);
            transform: translateY(-1px);
        }

        /* ── TABLES ── */
        .shifa-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        .shifa-table thead th {
            background: var(--navy);
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 13px 16px;
            border: none;
        }

        .shifa-table thead th:first-child { border-radius: 10px 0 0 0; }
        .shifa-table thead th:last-child  { border-radius: 0 10px 0 0; }

        .shifa-table tbody tr {
            transition: background 0.15s;
        }

        .shifa-table tbody tr:hover td {
            background: var(--teal-pale);
        }

        .shifa-table tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--gray-100);
            vertical-align: middle;
            background: var(--white);
        }

        /* ── BADGES ── */
        .badge-shifa {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-teal {
            background: var(--teal-pale);
            color: #0a7a6b;
        }

        .badge-navy {
            background: rgba(11,31,58,0.1);
            color: var(--navy);
        }

        /* ── STATS CARD ── */
        .stat-card {
            background: var(--white);
            border-radius: 14px;
            padding: 22px 20px;
            border: 1px solid var(--gray-100);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: rgba(14,159,140,0.2);
        }

        .stat-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 14px;
        }

        .stat-icon-teal { background: var(--teal-pale); color: var(--teal); }
        .stat-icon-navy { background: rgba(11,31,58,0.08); color: var(--navy); }
        .stat-icon-gold { background: rgba(245,166,35,0.12); color: var(--gold); }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--navy);
            line-height: 1;
        }

        /* ── ALERT MESSAGES ── */
        .shifa-alert {
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .shifa-alert-success {
            background: #ecfdf5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .shifa-alert-danger {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        /* ── FOOTER ── */
        .shifa-footer {
            background: var(--navy);
            color: rgba(255,255,255,0.6);
            padding: 24px 0;
            text-align: center;
            font-size: 13px;
            border-top: 1px solid rgba(14,159,140,0.2);
        }

        .shifa-footer .footer-brand {
            color: var(--teal-light);
            font-weight: 600;
        }

        .shifa-footer .footer-divider {
            color: rgba(255,255,255,0.2);
            margin: 0 8px;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--gray-50); }
        ::-webkit-scrollbar-thumb { background: rgba(14,159,140,0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--teal); }

        /* ── ANIMATIONS ── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="shifa-nav">
    <div class="container">

        <a class="nav-brand" href="/">
            <div class="nav-brand-icon">🦷</div>
            <div class="nav-brand-text">
                <span class="nav-brand-title">Shifa Dental</span>
                <span class="nav-brand-sub">Professional Care</span>
            </div>
        </a>

        <div class="nav-links">
            <a class="nav-link-item" href="/">
                <i class="bi bi-house-door"></i> Home
            </a>
            <a class="nav-link-item" href="/about">
                <i class="bi bi-info-circle"></i> About
            </a>
            <a class="nav-link-item" href="/register">
                <i class="bi bi-person-plus"></i> Register
            </a>
            <a class="nav-link-item" href="/patients">
                <i class="bi bi-people"></i> Patients
            </a>
            <a class="nav-link-item" href="/appointment">
                <i class="bi bi-calendar-plus"></i> Book
            </a>
            <a class="nav-link-item" href="/appointments">
                <i class="bi bi-calendar-check"></i> Appointments
            </a>
            <a class="nav-link-item" href="/expense">
                <i class="bi bi-receipt"></i> Expenses
            </a>
            <a class="nav-link-item" href="/expenses">
                <i class="bi bi-clock-history"></i> History
            </a>
            <a class="nav-link-item nav-btn-dashboard" href="/dashboard">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a class="nav-link-item nav-btn-login" href="/login">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
            <a class="nav-link-item nav-btn-logout" href="/logout">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>

    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main-content">
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- FOOTER -->
<footer class="shifa-footer">
    <div class="container">
        <span class="footer-brand">Shifa Dental Clinic</span>
        <span class="footer-divider">|</span>

        <i class="bi bi-geo-alt-fill" style="font-size:11px;"></i> Tuvvur, Kerala

        <span style="color: rgba(255,255,255,0.35); font-size:12px;">© 2026 All rights reserved</span>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
