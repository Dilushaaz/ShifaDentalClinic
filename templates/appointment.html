{% extends 'base.html' %}

{% block content %}

<!-- Page Header -->
<div class="page-header">
    <div class="container">
        <h1><i class="bi bi-calendar-plus me-2"></i>Book Appointment</h1>
        <p>Schedule a new patient appointment</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="shifa-card">
            <div class="shifa-card-header">
                <h5 style="margin:0;font-weight:600;display:flex;align-items:center;gap:10px;">
                    <i class="bi bi-calendar-check"></i> Appointment Details
                </h5>
            </div>
            <div class="shifa-card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label">
                                <i class="bi bi-person me-1"></i> Select Patient
                            </label>
                            <select class="form-select" name="patient" required>
                                <option value="" disabled selected>Choose a patient...</option>
                                {% for patient in patients %}
                                <option value="{{ patient.id }}">{{ patient.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="bi bi-calendar-date me-1"></i> Date
                            </label>
                            <input class="form-control" type="date" name="date" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                <i class="bi bi-clock me-1"></i> Time
                            </label>
                            <input class="form-control" type="time" name="time" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">
                                <i class="bi bi-clipboard2-heart me-1"></i> Treatment
                            </label>
                            <input class="form-control" type="text" name="treatment" placeholder="e.g. Root Canal, Cleaning, Extraction..." required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">
                                <i class="bi bi-currency-rupee me-1"></i> Fee (₹)
                            </label>
                            <div style="position:relative;">
                                <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9AA5B4;font-weight:600;">₹</span>
                                <input class="form-control" style="padding-left:30px;" type="number" step="0.01" name="fee" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="col-12" style="padding-top:8px;">
                            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                                <button class="btn-shifa-primary" type="submit">
                                    <i class="bi bi-calendar-check-fill"></i> Save Appointment
                                </button>
                                <a href="/appointments" class="btn-shifa-secondary">
                                    <i class="bi bi-arrow-left"></i> Back to List
                                </a>
                            </div>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
