{% extends 'base.html' %}

{% block content %}

<!-- Page Header -->
<div class="page-header">
    <div class="container">
        <h1><i class="bi bi-receipt me-2"></i>Add Expense</h1>
        <p>Record a new clinic expense</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="shifa-card">
            <div class="shifa-card-header">
                <h5 style="margin:0;font-weight:600;display:flex;align-items:center;gap:10px;">
                    <i class="bi bi-wallet2"></i> Expense Details
                </h5>
            </div>
            <div class="shifa-card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label">
                                <i class="bi bi-tag me-1"></i> Expense Title
                            </label>
                            <input class="form-control" type="text" name="title" placeholder="e.g. Dental supplies, Equipment..." required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">
                                <i class="bi bi-currency-rupee me-1"></i> Amount (₹)
                            </label>
                            <div style="position:relative;">
                                <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9AA5B4;font-weight:600;">₹</span>
                                <input class="form-control" style="padding-left:30px;" type="number" step="0.01" name="amount" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label">
                                <i class="bi bi-calendar-date me-1"></i> Date
                            </label>
                            <input class="form-control" type="date" name="date" required>
                        </div>

                        <div class="col-12" style="padding-top:8px;">
                            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                                <button type="submit" style="
                                    background: linear-gradient(135deg, #dc2626, #ef4444);
                                    color: #fff;
                                    border: none;
                                    border-radius: 10px;
                                    padding: 11px 24px;
                                    font-weight: 600;
                                    font-size: 14px;
                                    display: inline-flex;
                                    align-items: center;
                                    gap: 6px;
                                    box-shadow: 0 4px 12px rgba(220,38,38,0.3);
                                    cursor: pointer;
                                    transition: all 0.2s ease;
                                " onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                                    <i class="bi bi-save-fill"></i> Save Expense
                                </button>
                                <a href="/expenses" class="btn-shifa-secondary">
                                    <i class="bi bi-clock-history"></i> View History
                                </a>
                            </div>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
